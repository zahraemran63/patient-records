<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Diagnoses Management</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    color:#0d6efd;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.add{
    background:#198754;
    color:white;
}

.delete{
    background:#dc3545;
    color:white;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

</style>
</head>

<body>

<h1>🩺 Diagnoses Management</h1>

<div class="row">

<input
id="diagnosisName"
placeholder="Diagnosis Name"
>

<button
class="add"
onclick="addDiagnosis()">
Add Diagnosis
</button>

</div>

<div id="diagnosesContainer"></div>

<script>

const client = window.supabase.createClient(
'https://frgoxmfoucaqhevfmfbb.supabase.co',
'YOUR_ANON_KEY'
);

loadDiagnoses();

async function loadDiagnoses(){

    const { data, error } = await client
        .from('diagnoses')
        .select('*')
        .order('name');

    if(error){
        alert(error.message);
        return;
    }

    const container =
        document.getElementById('diagnosesContainer');

    container.innerHTML='';

    data.forEach(item=>{

        container.innerHTML += `
        <div class="card">

            <b>${item.name}</b>

            <button
            class="delete"
            onclick="deleteDiagnosis(${item.id})">
            Delete
            </button>

        </div>
        `;

    });

}

async function addDiagnosis(){

    const name =
        document.getElementById('diagnosisName')
        .value
        .trim();

    if(!name){
        alert('Enter diagnosis name');
        return;
    }

    const { data: existing } = await client
        .from('diagnoses')
        .select('id')
        .ilike('name', name);

    if(existing.length > 0){

        alert('Diagnosis already exists');

        return;
    }

    const { error } = await client
        .from('diagnoses')
        .insert({
            name:name
        });

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById('diagnosisName').value='';

    loadDiagnoses();

}

async function deleteDiagnosis(id){

    if(!confirm('Delete Diagnosis ?')){
        return;
    }

    const { error } = await client
        .from('diagnoses')
        .delete()
        .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    loadDiagnoses();

}

</script>

</body>
</html>
