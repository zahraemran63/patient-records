<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Records System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:20px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.welcome{background:#198754;color:#fff;padding:12px 20px;border-radius:30px;font-weight:bold;}
.logout{background:#dc3545;color:#fff;border:none;padding:12px 20px;border-radius:8px;}
.title{text-align:center;}
.title .icon{font-size:90px;}
.title h1{color:#0d6efd;font-size:55px;margin:10px 0;}
.search-row{display:flex;gap:10px;margin-top:25px;}
.search-row input{flex:1;padding:15px;font-size:18px;}
button{cursor:pointer;border:none;border-radius:8px;}
.btn-blue{background:#0d6efd;color:white;padding:15px 25px;}
.btn-green{background:green;color:white;padding:15px 25px;}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-top:25px;}
.filters button{padding:14px 20px;font-size:18px;}
.all{background:#198754;color:white;font-weight:bold;}
.follow{background:#fd7e14;color:white;}
.important{background:#ffc107;color:black;}
#results{margin-top:30px;}
</style>
</head>
<body>
<div class="topbar">
<div class="welcome">🛡️ Welcome Zahy</div>
<button class="logout">Logout</button>
</div>
<div class="title">
<div class="icon">🩺❤️</div>
<h1>Patient Records System</h1>
</div>
<div class="search-row">
<input id="searchFile" placeholder="Search File No or Name">
<button class="btn-blue">Search</button>
<button class="btn-green">+ Add Patient</button>
</div>
<div class="filters">
<button class="all">All Patients (0)</button>
<button class="follow">🔔 Follow Up (0)</button>
<button class="important">⭐ Important (0)</button>
</div>
<div id="results"></div>
