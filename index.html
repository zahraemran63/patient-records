<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Diagnoses Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
#diagnosesContainer{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:20px;
}

.diagnosis-btn{
    background:#0d6efd;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

.diagnosis-btn:hover{
    background:#0b5ed7;
}
    
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
}

.modal-content{
    width:550px;
    background:white;
    margin:60px auto;
    padding:20px;
    border-radius:12px;
}

.modal-content input{
    width:100%;
    padding:12px;
    box-sizing:border-box;
}

.modal-actions{
    margin-top:15px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}
h1{
    color:#0d6efd;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.add{
    background:#198754;
    color:white;
}

.delete{
    background:#dc3545;
    color:white;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

</style>
</head>

<body>

<h1>🩺 Diagnoses Management</h1>

<div class="row">

    <button
class="add"
onclick="openPatientModal()">
+ Add Patient
</button>
    

<button class="add"
onclick="openDiagnosisModal()">
+ Add Diagnosis
</button>

<button class="delete"
onclick="openDeleteDiagnosisModal()">
- Delete Diagnosis
</button>

</div>

<div id="deleteDiagnosisModal" class="modal">

    <div class="modal-content">

        <h2>Delete Diagnosis</h2>

        <select
        id="deleteDiagnosisSelect"
        style="width:100%;padding:12px;">

        </select>

        <div class="modal-actions">

            <button
            class="delete"
            onclick="confirmDeleteDiagnosis()">
            OK
            </button>

            <button
            class="add"
            onclick="closeDeleteDiagnosisModal()">
            Cancel
            </button>

        </div>

    </div>

</div>

<div id="diagnosesContainer"></div>
    <div id="patientsContainer"></div>
    <div id="patientModal" class="modal">

    <div class="modal-content" style="width:550px;">

        <h2>File Entry</h2>

        <label>File No</label>
        <input id="fileNo">

        <br><br>

        <label>Name</label>
        <input id="patientName">

        <br><br>

        <label>Diagnosis</label>
        <select
        id="patientDiagnosis"
        style="width:100%;padding:12px;">
        </select>

        <br><br>

<textarea
id="remarks"
style="width:100%;height:70px;"></textarea>

        <br><br>

        <label>Last Update</label>
        <input
        id="lastUpdate"
        type="date">

        <div class="modal-actions">

            <button
            class="add"
            onclick="savePatient()">
            OK
            </button>

            <button
            class="delete"
            onclick="closePatientModal()">
            Cancel
            </button>

        </div>

    </div>

</div>
    <div id="diagnosisModal" class="modal">

    <div class="modal-content">

        <h2>Add New Diagnosis</h2>

        <input
        id="diagnosisName"
        placeholder="Diagnosis Name"
        >

        <div class="modal-actions">

            <button
            class="add"
            onclick="addDiagnosis()">
            Save
            </button>

            <button
            class="delete"
            onclick="closeDiagnosisModal()">
            Cancel
            </button>

        </div>

    </div>

</div>

<script>

const client = window.supabase.createClient(
'https://frgoxmfoucaqhevfmfbb.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyZ294bWZvdWNhcWhldmZtZmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTMyOTksImV4cCI6MjA5OTY4OTI5OX0.P_T6rCs7k0MY5YPvPHG7XYbfJrY7TdmFnYooolh6r88'
);
console.log(client);
    async function savePatient(){

    const fileNo =
        document.getElementById('fileNo').value.trim();

    const name =
        document.getElementById('patientName').value.trim();

    const diagnosis =
        document.getElementById('patientDiagnosis').value;

    const remarks =
        document.getElementById('remarks').value;

    const lastUpdate =
        document.getElementById('lastUpdate').value;

    if(!fileNo || !name){

        alert('Please fill required fields');

        return;
    }

    const { data: existing } = await client
        .from('patients')
        .select('id')
        .eq('file_no', fileNo)
        .eq('diagnosis', diagnosis);

    if(existing && existing.length > 0){

        alert(
          `Patient already exists in diagnosis ${diagnosis}`
        );

        return;
    }

    const { error } = await client
        .from('patients')
        .insert({
            file_no:fileNo,
            name:name,
            diagnosis:diagnosis,
            remarks:remarks,
            last_update:lastUpdate
        });

    if(error){

        alert(error.message);

        return;
    }

alert('Patient Added Successfully');

document.getElementById('fileNo').value='';
document.getElementById('patientName').value='';
document.getElementById('remarks').value='';

showPatients(diagnosis);

closePatientModal();
}
function openDiagnosisModal(){
    document.getElementById('diagnosisModal').style.display='block';
}

function closeDiagnosisModal(){
    document.getElementById('diagnosisModal').style.display='none';
}
    async function openDeleteDiagnosisModal(){

    const select =
        document.getElementById('deleteDiagnosisSelect');

    select.innerHTML = '';

    const { data } = await client
        .from('diagnoses')
        .select('*')
        .order('name');

    data.forEach(item => {

        select.innerHTML += `
        <option value="${item.id}">
            ${item.name}
        </option>
        `;

    });

    document.getElementById(
        'deleteDiagnosisModal'
    ).style.display = 'block';
}

function closeDeleteDiagnosisModal(){

    document.getElementById(
        'deleteDiagnosisModal'
    ).style.display = 'none';
}
loadDiagnoses();
async function openPatientModal(){

    const today =
        new Date().toISOString().split('T')[0];

    document.getElementById(
        'lastUpdate'
    ).value = today;

    const select =
        document.getElementById(
            'patientDiagnosis'
        );

    select.innerHTML = '';

    const { data } = await client
        .from('diagnoses')
        .select('*')
        .order('name');

    data.forEach(item => {

        select.innerHTML += `
        <option value="${item.name}">
            ${item.name}
        </option>
        `;

    });

    document.getElementById(
        'patientModal'
    ).style.display='block';
}

function closePatientModal(){

    document.getElementById(
        'patientModal'
    ).style.display='none';
}
    async function confirmDeleteDiagnosis(){

    const id =
        document.getElementById(
            'deleteDiagnosisSelect'
        ).value;

    if(!id) return;

    const { error } = await client
        .from('diagnoses')
        .delete()
        .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    closeDeleteDiagnosisModal();

    loadDiagnoses();

    alert('Diagnosis deleted successfully');
}
    
async function loadDiagnoses(){

    const { data, error } = await client
        .from('diagnoses')
        .select('*')
        .order('name');

    if(error){
        alert(error.message);
        return;
    }

    const container =
        document.getElementById('diagnosesContainer');

    container.innerHTML='';

    data.forEach(item=>{

container.innerHTML += `
<button
class="diagnosis-btn"
onclick="showPatients('${item.name}')"
>
${item.name} (0)
</button>
`;

    });

}

async function addDiagnosis(){

    const name =
        document.getElementById('diagnosisName')
        .value
        .trim();

    if(!name){
        alert('Enter diagnosis name');
        return;
    }

    const { data: existing } = await client
        .from('diagnoses')
        .select('id')
        .ilike('name', name);

    if(existing && existing.length > 0){


        alert('Diagnosis already exists');

        return;
    }

    const { error } = await client
        .from('diagnoses')
        .insert({
            name:name
        });

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById('diagnosisName').value='';

closeDiagnosisModal();

loadDiagnoses();
}
async function showPatients(diagnosis){

    const { data, error } = await client
        .from('patients')
        .select('*')
        .eq('diagnosis', diagnosis);

    if(error){
        alert(error.message);
        return;
    }

    const container =
        document.getElementById('patientsContainer');

    container.innerHTML = '';

    data.forEach(patient => {

        container.innerHTML += `
<div class="card">

<div>

<b>File No:</b> ${patient.file_no}<br>
<b>Name:</b> ${patient.name}<br>
<b>Diagnosis:</b> ${patient.diagnosis}<br>
<b>Remarks:</b> ${patient.remarks || '-'}<br>
<b>Last Update:</b> ${patient.last_update || '-'}

</div>

</div>
`;


    });

}
async function deleteDiagnosis(id){

    if(!confirm('Delete Diagnosis ?')){
        return;
    }

    const { error } = await client
        .from('diagnoses')
        .delete()
        .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    loadDiagnoses();

}

</script>

</body>
</html>
