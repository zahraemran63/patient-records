<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Patient Records System</title>

.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,sans-serif;
max-width:1200px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.top{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input{
padding:10px;
}

button{
padding:10px 15px;
cursor:pointer;
border:none;
border-radius:5px;
background:#0d6efd;
color:white;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,.15);
}

.deleteBtn{
background:#dc3545;
}

.editBtn{
background:#ffc107;
color:black;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
}

.modal-content{
background:white;
padding:20px;
width:650px;
max-width:95%;
margin:30px auto;
border-radius:10px;
}

textarea,
select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Patient Records System</h1>

<div class="top">

<input
id="searchText"
placeholder="Search File No or Name">

<button onclick="searchPatients()">
Search
</button>

<button onclick="openAddForm()">
Add Patient
</button>

<button onclick="loadPatients()">
Refresh
</button>

</div>

<div id="results"></div>

<div id="modal" class="modal">

<div class="modal-content">

<h2>Patient Entry</h2>

<input id="fileNo" placeholder="File No">

<input id="patientName" placeholder="Patient Name">

<input id="diagnosis" placeholder="Diagnosis">

<textarea
id="remarks"
placeholder="Remarks"></textarea>

<input
id="lastUpdate"
placeholder="Last Update">

<button onclick="savePatient()">
Save
</button>

<button onclick="closeForm()">
Cancel
</button>

</div>

</div>

<script>

const SUPABASE_URL =
"https://frgoxmfoucaqhevfmfbb.supabase.co";

const SUPABASE_KEY =
"ضع_الـ_ANON_KEY_هنا";

const client =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let editId = null;

function openAddForm(){

editId = null;

document.getElementById("fileNo").value = "";
document.getElementById("patientName").value = "";
document.getElementById("diagnosis").value = "";
document.getElementById("remarks").value = "";

document.getElementById("lastUpdate").value =
new Date().toLocaleDateString();

document.getElementById("modal").style.display =
"block";

}

function closeForm(){

document.getElementById("modal").style.display =
"none";

}

async function loadPatients(){

const result =
await client
.from("patients")
.select("*")
.order("id",{ascending:false});

showPatients(result.data || []);

}

async function searchPatients(){

const search =
document.getElementById("searchText")
.value
.toLowerCase();

const result =
await client
.from("patients")
.select("*");

const filtered =
(result.data || []).filter(function(p){

return (
String(p.file_no || "")
.toLowerCase()
.includes(search)

||

String(p.name || "")
.toLowerCase()
.includes(search)

);

});

showPatients(filtered);

}

async function savePatient(){

const data = {

file_no:
document.getElementById("fileNo").value,

name:
document.getElementById("patientName").value,

diagnosis:
document.getElementById("diagnosis").value,

remarks:
document.getElementById("remarks").value,

last_update:
document.getElementById("lastUpdate").value

};

if(editId){

await client
.from("patients")
.update(data)
.eq("id",editId);

}else{

await client
.from("patients")
.insert([data]);

}

closeForm();

loadPatients();

}

function editPatient(patient){

editId = patient.id;

document.getElementById("fileNo").value =
patient.file_no || "";

document.getElementById("patientName").value =
patient.name || "";

document.getElementById("diagnosis").value =
patient.diagnosis || "";

document.getElementById("remarks").value =
patient.remarks || "";

document.getElementById("lastUpdate").value =
patient.last_update || "";

document.getElementById("modal").style.display =
"block";

}

async function deletePatient(id){

if(!confirm("Delete this patient?")){
return;
}

await client
.from("patients")
.delete()
.eq("id",id);

loadPatients();

}

function showPatients(list){

let html = "";

list.forEach(function(p){

html += `

<div class="card">

<div>
📁 <b>${p.file_no || ""}</b>
</div>

<div>
👤 ${p.name || ""}
</div>

<div>
🩺 ${p.diagnosis || ""}
</div>

<div>
📝 ${p.remarks || ""}
</div>

<div>
📅 ${p.last_update || ""}
</div>

<br>

<button
class="editBtn"
onclick='editPatient(${JSON.stringify(p)})'>
Edit
</button>

<button
class="deleteBtn"
onclick='deletePatient(${p.id})'>
Delete
</button>

</div>

`;

});

document.getElementById("results").innerHTML =
html;

}

loadPatients();

</script>

</body>
</html>
