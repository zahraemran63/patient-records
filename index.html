async function exportExcel() {

    const btn =
        document.getElementById('exportBtn');

    btn.disabled = true;
    btn.innerHTML = '⏳ Exporting...';

    try {

        const workbook =
            new ExcelJS.Workbook();

        workbook.creator =
            'Patient Records System';

        workbook.created =
            new Date();

        const summarySheet =
            workbook.addWorksheet(
                'Summary'
            );

        summarySheet.columns = [
            {
                header: 'Diagnosis',
                key: 'diagnosis',
                width: 40
            },
            {
                header: 'Patients',
                key: 'count',
                width: 20
            }
        ];

        summarySheet.getRow(1).eachCell(cell => {

            cell.font = {
                bold: true,
                color: {
                    argb: 'FFFFFFFF'
                }
            };

            cell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: {
                    argb: '1F4E78'
                }
            };

            cell.border = {
                top: { style:'thin' },
                left:{ style:'thin' },
                bottom:{ style:'thin' },
                right:{ style:'thin' }
            };

        });

        const { data: diagnoses } =
            await client
                .from('diagnoses')
                .select('*')
                .order('name');

        for (const diag of diagnoses) {

if(
    diag.name === 'Explain' ||
    diag.name === '🔔 Follow Up'
){
    continue;
}

            const {
                data: patients
            } = await client
                .from('patients')
                .select('*')
                .eq(
                    'diagnosis',
                    diag.name
                )
                .order('file_no');

            summarySheet.addRow({
                diagnosis: diag.name,
                count: patients.length
            });

            const sheet =
                workbook.addWorksheet(
                    diag.name.substring(0,31)
                );

            sheet.mergeCells('A1:E1');

            sheet.getCell('A1').value =

                    argb:'FFFFFFFF'

            };

            sheet.getCell('A1').alignment = {

            };

            sheet.getCell('A1').fill = {
                type:'pattern',
                pattern:'solid',
                fgColor:{
                    argb:'1F4E78'
                }
            };

            sheet.mergeCells('A2:E2');

            sheet.getCell('A2').value =
                `Diagnosis: ${diag.name}`;

            sheet.mergeCells('A3:E3');

            sheet.getCell('A3').value =
                `Total Patients: ${patients.length}`;

            sheet.mergeCells('A4:E4');

            sheet.getCell('A4').value =
                `Export Date: ${new Date().toLocaleDateString()}`;

            sheet.columns = [
{
header:'S.No',
key:'no',
width:10
},
{
header:'MRN',
key:'mrn',
width:20
},
{
header:'Name',
key:'name',
width:35
},
{
header:'Mobile',

    async function importExcel(event){
        if(typeof XLSX === 'undefined'){
    alert('XLSX Library Not Loaded');
    return;
}

    const btn =
        document.getElementById('importBtn');

    btn.disabled = true;
    btn.innerHTML = '⏳ Importing...';

    try {

        const file = event.target.files[0];

        if(!file){
            return;
        }

        const data =
            await file.arrayBuffer();

        const workbook =
            XLSX.read(data);

        for(const sheetName of workbook.SheetNames){

            const diagnosisName =
                sheetName.trim();

            const {
                data: existingDiagnosis
            } = await client
                .from('diagnoses')
                .select('id')
                .ilike('name', diagnosisName);

            if(
                !existingDiagnosis ||
                existingDiagnosis.length === 0
            ){

                await client
                    .from('diagnoses')
                    .insert({
                        name: diagnosisName
                    });
            }

            const sheet =
                workbook.Sheets[sheetName];

            const rows =
                XLSX.utils.sheet_to_json(
                    sheet,
                    { header:1 }
                );

            for(let i = 1; i < rows.length; i++){

                const row = rows[i];

                if(!row){
                    continue;
                }

                const fileNo =
                    row[1] || '';

                const name =
                    row[2] || '';

                const phone =
row[3] || '';

const remarks =
row[4] || '';

const lastUpdate =
row[5] || null;

                if(
                    !fileNo &&
                    !name &&
                    !remarks &&
                    !lastUpdate
                ){
                    continue;
                }

                await client
                    .from('patients')
.insert({
file_no:String(fileNo),
name:String(name),
phone:String(phone),
diagnosis:diagnosisName,
remarks:String(remarks),
last_update:lastUpdate || null

                    });

            }
        }

        await loadDiagnoses();

        await showAllPatients();

        alert(
            'Import completed successfully'
        );

    }
    catch(error){

        alert(error.message);

    }
    finally {

        btn.disabled = false;
        btn.innerHTML = 'Import Excel';

        document.getElementById(
            'excelFile'
        ).value = '';

    }
}
