<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Diagnoses Management</title>

'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',

<style>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
}

.modal-content{
    width:450px;
    background:white;
    margin:120px auto;
    padding:25px;
    border-radius:12px;
}

.modal-content input{
    width:100%;
    padding:12px;
    box-sizing:border-box;
}

.modal-actions{
    margin-top:15px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}
h1{
    color:#0d6efd;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.add{
    background:#198754;
    color:white;
}

.delete{
    background:#dc3545;
    color:white;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

</style>
</head>

<body>

<h1>🩺 Diagnoses Management</h1>

<div class="row">

<button
class="add"
onclick="openDiagnosisModal()">
+ Add Diagnosis
</button>

</div>

<div id="diagnosesContainer"></div>
    <div id="diagnosisModal" class="modal">

    <div class="modal-content">

        <h2>Add New Diagnosis</h2>

        <input
        id="diagnosisName"
        placeholder="Diagnosis Name"
        >

        <div class="modal-actions">

            <button
            class="add"
            onclick="addDiagnosis()">
            Save
            </button>

            <button
            class="delete"
            onclick="closeDiagnosisModal()">
            Cancel
            </button>

        </div>

    </div>

</div>

<script>

const client = window.supabase.createClient(
'https://frgoxmfoucaqhevfmfbb.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyZ294bWZvdWNhcWhldmZtZmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTMyOTksImV4cCI6MjA5OTY4OTI5OX0.P_T6rCs7k0MY5YPvPHG7XYbfJrY7TdmFnYooolh6r88'
);

function openDiagnosisModal(){
    document.getElementById('diagnosisModal').style.display='block';
}

function closeDiagnosisModal(){
    document.getElementById('diagnosisModal').style.display='none';
}
loadDiagnoses();

async function loadDiagnoses(){

    const { data, error } = await client
        .from('diagnoses')
        .select('*')
        .order('name');

    if(error){
        alert(error.message);
        return;
    }

    const container =
        document.getElementById('diagnosesContainer');

    container.innerHTML='';

    data.forEach(item=>{

        container.innerHTML += `
        <div class="card">

            <b>${item.name}</b>

            <button
            class="delete"
            onclick="deleteDiagnosis(${item.id})">
            Delete
            </button>

        </div>
        `;

    });

}

async function addDiagnosis(){

    const name =
        document.getElementById('diagnosisName')
        .value
        .trim();

    if(!name){
        alert('Enter diagnosis name');
        return;
    }

    const { data: existing } = await client
        .from('diagnoses')
        .select('id')
        .ilike('name', name);

    if(existing.length > 0){

        alert('Diagnosis already exists');

        return;
    }

    const { error } = await client
        .from('diagnoses')
        .insert({
            name:name
        });

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById('diagnosisName').value='';

closeDiagnosisModal();

loadDiagnoses();
}

async function deleteDiagnosis(id){

    if(!confirm('Delete Diagnosis ?')){
        return;
    }

    const { error } = await client
        .from('diagnoses')
        .delete()
        .eq('id', id);

    if(error){
        alert(error.message);
        return;
    }

    loadDiagnoses();

}

</script>

</body>
</html>
