<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Records System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px;}
input{padding:10px;margin:5px;}
button{padding:10px;}
.card{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:8px;}
</style>
</head>
<body>
<h1>Patient Records System</h1>
<input id="fileNo" placeholder="File No">
<input id="patientName" placeholder="Patient Name">
<button onclick="savePatient()">Add Patient</button>
<div id="patients"></div>
<script>
const SUPABASE_URL="https://frgoxmfoucaqhevfmfbb.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyZ294bWZvdWNhcWhldmZtZmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTMyOTksImV4cCI6MjA5OTY4OTI5OX0.P_T6rCs7k0MY5YPvPHG7XYbfJrY7TdmFnYooolh6r88";
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
async function loadPatients(){
 const result=await client.from('patients').select('*').order('id');
 if(result.error){console.error(result.error);return;}
 let html='';
 (result.data||[]).forEach(function(patient){
  html+=`<div class="card"><b>File No:</b> ${patient.file_no||''}<br><b>Name:</b> ${patient.name||''}</div>`;
 });
 document.getElementById('patients').innerHTML=html;
}
async function savePatient(){
 const fileNo=document.getElementById('fileNo').value;
 const patientName=document.getElementById('patientName').value;
 const result=await client.from('patients').insert([{file_no:fileNo,name:patientName}]);
 if(result.error){alert(result.error.message);console.error(result.error);return;}
 document.getElementById('fileNo').value='';
 document.getElementById('patientName').value='';
 loadPatients();
}
loadPatients();
</script>
</body>
</html>
